# Geçici production: Worker → Render (SPA+API). Docker/SPA build YOK.
# Workers Builds: Deploy = npx wrangler deploy

name = "haberler"
compatibility_date = "2025-07-15"
main = "cloudflare/worker.js"
compatibility_flags = ["nodejs_compat"]
workers_dev = true

[vars]
API_ORIGIN = "https://goalgo-y7ze.onrender.com"

# Cloudflare zone yekpare.net → Worker (Netlify origin'i ezer)
[[routes]]
pattern = "yekpare.net/*"
zone_name = "yekpare.net"

[[routes]]
pattern = "www.yekpare.net/*"
zone_name = "yekpare.net"

[[routes]]
pattern = "yekpare.net"
zone_name = "yekpare.net"

[[routes]]
pattern = "www.yekpare.net"
zone_name = "yekpare.net"
