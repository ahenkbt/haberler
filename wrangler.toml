# Geçici: Worker → Render. Netlify origin tamamen by-pass.
name = "haberler"
compatibility_date = "2025-07-15"
main = "cloudflare/worker.js"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
account_id = "16f5b996194174624e7969a3658bd2bb"

[vars]
API_ORIGIN = "https://goalgo-y7ze.onrender.com"

# Apex: zone route (mevcut DNS ile uyumlu — custom_domain A/CNAME çakışması yapmaz)
[[routes]]
pattern = "yekpare.net/*"
zone_name = "yekpare.net"

[[routes]]
pattern = "yekpare.net"
zone_name = "yekpare.net"

# www: DNS yoksa custom_domain kaydı oluşturur
[[routes]]
pattern = "www.yekpare.net"
custom_domain = true

# HM editör siteleri (Cloudflare zone olanlar → Worker → Render)
[[routes]]
pattern = "ankarahabergundemi.com/*"
zone_name = "ankarahabergundemi.com"

[[routes]]
pattern = "ankarahabergundemi.com"
zone_name = "ankarahabergundemi.com"

[[routes]]
pattern = "www.ankarahabergundemi.com/*"
zone_name = "ankarahabergundemi.com"

[[routes]]
pattern = "www.ankarahabergundemi.com"
zone_name = "ankarahabergundemi.com"

[[routes]]
pattern = "turk.eco/*"
zone_name = "turk.eco"

[[routes]]
pattern = "turk.eco"
zone_name = "turk.eco"

[[routes]]
pattern = "www.turk.eco/*"
zone_name = "turk.eco"

[[routes]]
pattern = "www.turk.eco"
zone_name = "turk.eco"

# Error 1016: zone Cloudflare'de aktif (SOA var) ama A/AAAA yok.
# custom_domain DNS + Worker bağlar. (Diğer HM alanları zone/API yoksa deploy'u düşürmesin diye burada yok.)
[[routes]]
pattern = "ankarasehirgazetesi.com"
custom_domain = true

[[routes]]
pattern = "www.ankarasehirgazetesi.com"
custom_domain = true

# VKD: elde A 192.0.2.1 Proxied varsa custom_domain reddedilir (100117).
# Zone route Worker'ı origin yapar → Error 522 kalkar.
[[routes]]
pattern = "vatankahramanlari.org/*"
zone_name = "vatankahramanlari.org"

[[routes]]
pattern = "vatankahramanlari.org"
zone_name = "vatankahramanlari.org"

[[routes]]
pattern = "www.vatankahramanlari.org/*"
zone_name = "vatankahramanlari.org"

[[routes]]
pattern = "www.vatankahramanlari.org"
zone_name = "vatankahramanlari.org"
