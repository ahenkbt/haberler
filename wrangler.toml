# Geçici: Worker → Render. Netlify origin tamamen by-pass.
name = "haberler"
compatibility_date = "2025-07-15"
main = "cloudflare/worker.js"
compatibility_flags = ["nodejs_compat"]
workers_dev = true
account_id = "16f5b996194174624e7969a3658bd2bb"

[vars]
API_ORIGIN = "https://goalgo-y7ze.onrender.com"

# Apex: zone route (mevcut DNS ile uyumlu — custom_domain A/CNAME çakışması yapmaz)
[[routes]]
pattern = "yekpare.net/*"
zone_name = "yekpare.net"

[[routes]]
pattern = "yekpare.net"
zone_name = "yekpare.net"

# www: DNS yoksa custom_domain kaydı oluşturur
[[routes]]
pattern = "www.yekpare.net"
custom_domain = true

# HM editör siteleri (Cloudflare zone olanlar → Worker → Render)
[[routes]]
pattern = "ankarahabergundemi.com/*"
zone_name = "ankarahabergundemi.com"

[[routes]]
pattern = "ankarahabergundemi.com"
zone_name = "ankarahabergundemi.com"

[[routes]]
pattern = "www.ankarahabergundemi.com/*"
zone_name = "ankarahabergundemi.com"

[[routes]]
pattern = "www.ankarahabergundemi.com"
zone_name = "ankarahabergundemi.com"

[[routes]]
pattern = "turk.eco/*"
zone_name = "turk.eco"

[[routes]]
pattern = "turk.eco"
zone_name = "turk.eco"

[[routes]]
pattern = "www.turk.eco/*"
zone_name = "turk.eco"

[[routes]]
pattern = "www.turk.eco"
zone_name = "turk.eco"

# --- Error 1016 fix: originless Worker Custom Domains ---
# Zone Cloudflare'de ama A/AAAA yok → CF Origin DNS error.
# custom_domain DNS + sertifika oluşturur; AAAA 100:: cutover yedeği.
[[routes]]
pattern = "ankarasehirgazetesi.com"
custom_domain = true

[[routes]]
pattern = "www.ankarasehirgazetesi.com"
custom_domain = true

[[routes]]
pattern = "vatankahramanlari.org"
custom_domain = true

[[routes]]
pattern = "www.vatankahramanlari.org"
custom_domain = true

[[routes]]
pattern = "vatanhaber.net"
custom_domain = true

[[routes]]
pattern = "www.vatanhaber.net"
custom_domain = true
