# Cloudflare Workers + Containers (API) + Neon Postgres
# Secrets:
#   CLOUDFLARE_API_TOKEN
#   CLOUDFLARE_ACCOUNT_ID
#   DATABASE_URL          (Neon connection string)
#   SESSION_SECRET        (min 16 chars)
# Optional: AGENTLABS_URL
name: Cloudflare Production Deploy

on:
  push:
    branches:
      - main
    paths:
      - "goalgo/artifacts/ahenkpress/**"
      - "goalgo/artifacts/yektube-web/**"
      - "goalgo/artifacts/api-server/**"
      - "goalgo/lib/**"
      - "goalgo/Dockerfile.cloudflare"
      - "goalgo/scripts/copy-yektube-build.mjs"
      - "goalgo/scripts/cloudflare-build.mjs"
      - "goalgo/scripts/write-netlify-redirects.mjs"
      - "goalgo/scripts/generate-public-sitemap.mjs"
      - "goalgo/scripts/resolve-api-origin.mjs"
      - "scripts/cloudflare-root-build.mjs"
      - "cloudflare/**"
      - "wrangler.toml"
      - "package.json"
      - "pnpm-lock.yaml"
      - ".github/workflows/cloudflare-production.yml"
  workflow_dispatch:

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check Cloudflare + Neon secrets
        id: cf
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::Skipping deploy (CLOUDFLARE_API_TOKEN missing)."
            exit 0
          fi
          # ACCOUNT_ID wrangler.toml / cf-fix ile aynı varsayılan
          if [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "ACCOUNT_ID=16f5b996194174624e7969a3658bd2bb" >> "$GITHUB_ENV"
          else
            echo "ACCOUNT_ID=$CLOUDFLARE_ACCOUNT_ID" >> "$GITHUB_ENV"
          fi
          # Neon secrets isteğe bağlı — SPA Assets + Worker deploy için token yeterli
          if [ -z "$DATABASE_URL" ] || [ -z "$SESSION_SECRET" ]; then
            echo "sync_secrets=false" >> "$GITHUB_OUTPUT"
            echo "::notice::DATABASE_URL / SESSION_SECRET yok — Worker secret sync atlanacak, SPA deploy devam."
          else
            echo "sync_secrets=true" >> "$GITHUB_OUTPUT"
          fi
          echo "enabled=true" >> "$GITHUB_OUTPUT"

      - uses: pnpm/action-setup@v6
        if: steps.cf.outputs.enabled == 'true'
        with:
          version: 9.15.5

      - uses: actions/setup-node@v6
        if: steps.cf.outputs.enabled == 'true'
        with:
          node-version: 22
          cache: pnpm
          cache-dependency-path: |
            pnpm-lock.yaml
            goalgo/pnpm-lock.yaml

      - name: Install root deps (wrangler / containers)
        if: steps.cf.outputs.enabled == 'true'
        run: pnpm install

      - name: Build SPA
        if: steps.cf.outputs.enabled == 'true'
        env:
          # Same-origin: boş API_ORIGIN → Worker Container /api
          API_ORIGIN: ""
          NPM_CONFIG_PRODUCTION: "false"
          AGENTLABS_URL: ${{ secrets.AGENTLABS_URL || '' }}
        run: pnpm run build:cloudflare

      - name: Deploy Worker + Static Assets to Cloudflare
        if: steps.cf.outputs.enabled == 'true'
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.ACCOUNT_ID }}
        run: pnpm exec wrangler deploy

      # Secret put, deploy edilmemiş version varken fail oluyor — önce deploy, sonra secret.
      - name: Sync Worker secrets (Neon)
        if: steps.cf.outputs.enabled == 'true' && steps.cf.outputs.sync_secrets == 'true'
        continue-on-error: true
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ env.ACCOUNT_ID }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          SESSION_SECRET: ${{ secrets.SESSION_SECRET }}
          AGENTLABS_URL: ${{ secrets.AGENTLABS_URL || '' }}
        run: |
          printf '%s' "$DATABASE_URL" | pnpm exec wrangler secret put DATABASE_URL
          printf '%s' "$SESSION_SECRET" | pnpm exec wrangler secret put SESSION_SECRET
          if [ -n "$AGENTLABS_URL" ]; then
            printf '%s' "$AGENTLABS_URL" | pnpm exec wrangler secret put AGENTLABS_URL
          fi
