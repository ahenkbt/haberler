# Netlify kapatıldı — yanlışlıkla build olsa bile Cloudflare'e yönlendir.
# Üretim: Cloudflare Worker → Render (goalgo-y7ze.onrender.com)

[build]
  command = "mkdir -p dist && printf '%s\\n' '<!DOCTYPE html><meta http-equiv=\"refresh\" content=\"0;url=https://yekpare.net/\"><title>Moved</title><p><a href=\"https://yekpare.net/\">yekpare.net</a></p>' > dist/index.html"
  publish = "dist"

[[redirects]]
  from = "/*"
  to = "https://yekpare.net/:splat"
  status = 301
  force = true
